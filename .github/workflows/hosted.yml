name: Hosted gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20.19.4
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: 1.3.14
      - name: Install locked dependencies
        run: bun install --frozen-lockfile
      - name: Restore the exact parity oracle
        run: |
          git clone https://github.com/vercel/streamdown.git .reference/streamdown
          git -C .reference/streamdown checkout e5deed330aa4231751a106445d93d62e4716a22f
      - name: Run reproducible hosted gates, including visual evidence integrity
        run: bun run ci:hosted
      - name: Generate evidence report
        if: always()
        run: bun run release:report -- --output release-report.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: release-report
          path: release-report.json
          if-no-files-found: error
